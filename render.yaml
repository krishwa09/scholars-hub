# Render Blueprint — provisions the Spring Boot API + a managed Postgres.
# In Render: New → Blueprint → point at this repo. Deploy the frontend separately
# on Vercel/Netlify (see DEPLOY.md).
databases:
  - name: scholars-hub-db
    plan: free
    databaseName: scholarshub
    user: scholars

services:
  - type: web
    name: scholars-hub-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/subjects
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # The JDBC URL is assembled from these parts in application-prod.properties,
      # so no manual URL editing is needed.
      - key: DB_HOST
        fromDatabase:
          name: scholars-hub-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: scholars-hub-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: scholars-hub-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: scholars-hub-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: scholars-hub-db
          property: password
      # Your deployed frontend origin, e.g. https://scholars-hub.vercel.app
      # Set this after Vercel gives you a URL (step B2), then redeploy.
      - key: FRONTEND_ORIGIN
        sync: false
