server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: always fall back to index.html so client-side view state works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache built assets aggressively (they are content-hashed by Vite).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
