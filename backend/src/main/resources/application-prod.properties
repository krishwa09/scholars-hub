# Production profile — activate with SPRING_PROFILES_ACTIVE=prod
# Backed by PostgreSQL. All values come from environment variables so no secrets
# are committed. See DEPLOY.md.

# Use SPRING_DATASOURCE_URL if given (Docker Compose); otherwise build the JDBC URL
# from the individual DB_* parts that Render injects from its managed Postgres.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:scholarshub}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Keep the schema across restarts; the seeder only runs when tables are empty.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Disable the H2 console in production.
spring.h2.console.enabled=false

# Honor the platform-provided port (Render/Railway/Heroku set $PORT).
server.port=${PORT:8080}

# Allow large base64 image uploads.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Restrict CORS to your deployed frontend origin(s), comma-separated.
# e.g. https://scholars-hub.vercel.app
app.cors.allowed-origins=${FRONTEND_ORIGIN:*}

# Shown on the API's root page so it points at the real site, not localhost.
app.website-url=${FRONTEND_ORIGIN:the deployed frontend}

# Never leak OTP codes over the API in production. If MAIL_HOST isn't set, codes
# are only visible in the server logs.
app.otp.expose-in-response=false
