# Server
server.port=8080

# H2 in-memory database (zero setup). Data resets on restart; the DataSeeder repopulates it.
spring.datasource.url=jdbc:h2:mem:scholarshub;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 web console at http://localhost:8080/h2-console (JDBC URL: jdbc:h2:mem:scholarshub)
spring.h2.console.enabled=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Allow large data URIs (base64 images) in request bodies
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS: allow any origin locally. Override in prod (see application-prod.properties).
app.cors.allowed-origins=*

# --- Email (used to send OTP codes) ---
# Leave MAIL_HOST unset to run without email: the OTP is written to the server log
# and (in dev only) returned in the API response so you can test the flow.
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:no-reply@scholarshub.local}

# --- OTP policy ---
app.otp.ttl-minutes=10
app.otp.max-attempts=5
# DEV ONLY: return the code in the API response when email isn't configured.
# This is forced off in the prod profile.
app.otp.expose-in-response=true
